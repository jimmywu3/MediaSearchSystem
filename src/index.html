<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="styles.css" />
        <script src="javascript.js"></script>
        <title>Media Thingy</title>
    </head>
    <body>
        <nav>
            <a href="">
                <div class="logo">Media Thingy</div>
            </a>
            <div class="buttons">
                <ul>
                    <a href="" id="open-add-modal">
                        <li class="add">+</li>
                    </a>
                    <button id="open-profile" class="profile" type="button">
                        Profile
                    </button>
                    <button id="open-debug" class="debug" type="button">
                        🐛 Debug
                    </button>
                </ul>
            </div>
        </nav>

        <div class="content">
            <div class="row1">
                <div class="row-header">
                    <h2>Recommended For You</h2>
                    <button
                        class="refresh-btn"
                        data-target="cards1"
                        title="Refresh"
                    >
                        ⟳
                    </button>
                </div>
                <!-- Dyanmically insert movie cards -->
                <div class="cards1">
                    <div class="skeleton-card">
                        <div class="skeleton skeleton-poster"></div>
                        <div class="skeleton skeleton-text title"></div>
                        <div class="skeleton skeleton-text subtitle"></div>
                    </div>

                    <div class="skeleton-card">
                        <div class="skeleton skeleton-poster"></div>
                        <div class="skeleton skeleton-text title"></div>
                        <div class="skeleton skeleton-text subtitle"></div>
                    </div>
                </div>
            </div>
            <div class="row2">
                <div class="row-header">
                    <h2 id="row2-title">
                        Because you like "Insert Genre or Movie Name"
                    </h2>
                    <button
                        class="refresh-btn"
                        data-target="cards2"
                        title="Refresh"
                    >
                        ⟳
                    </button>
                </div>
                <!-- Dyanmically insert movie cards -->
                <div class="cards2"></div>
            </div>
            <div class="row3">
                <div class="row-header">
                    <h2 id="row3-title">Popular at this time for you</h2>
                    <button
                        class="refresh-btn"
                        data-target="cards3"
                        title="Refresh"
                    >
                        ⟳
                    </button>
                </div>
                <!-- Dyanmically insert movie cards -->
                <div class="cards3"></div>
            </div>
        </div>

        <dialog id="profile-modal">
            <div class="profile-header">
                <h3>Watch History</h3>
                <button id="close-profile-modal" type="button"><p>×</p></button>
            </div>
            <div class="profile-body">
                <table class="history-table">
                    <thead>
                        <tr>
                            <th>Movie</th>
                            <th>Rating</th>
                            <th>Watched (hour)</th>
                        </tr>
                    </thead>
                    <tbody id="history-body">
                        <tr>
                            <td colspan="3">Loading…</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </dialog>

        <dialog id="debug-modal">
            <div class="profile-header">
                <h3>Debug Controls</h3>
                <button id="close-debug-modal" type="button"><p>×</p></button>
            </div>
            <div class="form-group">
                <label for="debug-hour">Override Current Hour (0-23):</label>
                <input
                    type="number"
                    id="debug-hour"
                    min="0"
                    max="23"
                    step="1"
                    value="12"
                />
            </div>
            <div class="dialog-actions">
                <button
                    type="button"
                    id="debug-clear-btn"
                    class="btn-secondary"
                >
                    Clear Override
                </button>
                <button type="button" id="debug-set-btn" class="btn-primary">
                    Set & Refresh
                </button>
            </div>
        </dialog>

        <dialog id="add-movie-modal">
            <form id="add-movie-form">
                <h3>Add a Movie</h3>

                <div class="form-group">
                    <label for="movie-search">Search Movie:</label>
                    <input
                        type="text"
                        id="movie-search"
                        name="movie-search"
                        placeholder="Type a movie title..."
                        autocomplete="off"
                        list="movie-suggestions"
                        required
                    />
                    <datalist id="movie-suggestions"> </datalist>
                </div>

                <div class="form-group rating-group">
                    <p>Rate it (0 - 10): <span id="rating-value">7.5</span></p>
                    <input
                        type="range"
                        id="rating"
                        name="rating"
                        min="0"
                        max="10"
                        step="0.1"
                        value="7.5"
                        required
                    />
                </div>

                <div class="form-group">
                    <label for="watched-hour">Watched hour (0–23):</label>
                    <input
                        type="number"
                        id="watched-hour"
                        name="watched-hour"
                        min="0"
                        max="23"
                        step="1"
                        required
                    />
                </div>

                <div class="dialog-actions">
                    <button
                        type="button"
                        id="close-modal-btn"
                        class="btn-secondary"
                    >
                        Cancel
                    </button>
                    <button type="submit" class="btn-primary">Save</button>
                </div>
            </form>
        </dialog>
    </body>
</html>
